    label { display: block; font-weight: 600; margin-top: 14px; font-size: 14px; }

  <div class="wrap">
    <header>
      <nav>

    <h1>Contact</h1>
    <p>We reply as soon as we can. For urgent billing, include your subscription email.</p>

    <div class="emails">
      <p><strong>Trial &amp; general:</strong> <a href="mailto:monstertv6969@gmail.com">monstertv6969@gmail.com</a></p>
      <p><strong>Subscriptions:</strong> <a href="mailto:monstertvpayments6969@gmail.com">monstertvpayments6969@gmail.com</a></p>
    </div>

    <div class="box">
      <form name="contact" method="POST" action="/" data-netlify="true" netlify netlify-honeypot="contact-bot-field">
        <p style="display:none;">
          <label>Don't fill this out if you're human: <input name="contact-bot-field" /></label>
        </p>
        <label for="cname">Full name *</label>
        <input type="text" id="cname" name="name" required autocomplete="name" />

        <label for="cemail">Email *</label>
        <input type="email" id="cemail" name="email" required autocomplete="email" />

        <label for="csub">Subject *</label>
        <select id="csub" name="subject" required>
          <option value="">Select a subject</option>
          <option value="trial">Free trial</option>
          <option value="subscription">Subscription</option>
          <option value="support">Technical support</option>
          <option value="billing">Billing</option>
          <option value="other">Other</option>
        </select>

        <label for="cmsg">Message *</label>
        <textarea id="cmsg" name="message" required placeholder="How can we help?"></textarea>

        <button type="submit">Send message</button>
      </form>
    </div>

    <footer>
      <a href="/">← Back to Monster Streams</a>
    </footer>
  </div>
